<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Caballeros del Arte Gráfico</title>
    <style>
        body {
            background: radial-gradient(circle, #1e1e1e 0%, #000000 100%);
            color: #ffffff;
            font-family: 'Georgia', serif;
            margin: 0; padding: 20px;
            display: flex; flex-direction: column; align-items: center; text-align: center;
        }
        .header-section { min-height: 80vh; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        img.logo { max-width: 280px; filter: drop-shadow(0 0 15px rgba(255,255,255,0.1)); margin-bottom: 20px; }
        h1 { font-size: 2.2rem; letter-spacing: 4px; text-transform: uppercase; margin: 10px 0; }
        .gold-text { color: #d4af37; font-style: italic; font-size: 1.1rem; margin-bottom: 30px; }
        
        /* Contenedor de Servicios y Galerías */
        .services-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 25px; max-width: 1100px; width: 100%; margin-bottom: 50px; }
        .card { background: rgba(255,255,255,0.03); border: 1px solid #444; border-radius: 12px; padding: 25px; transition: 0.3s; }
        .card h3 { color: #d4af37; text-transform: uppercase; margin-bottom: 15px; border-bottom: 1px solid #d4af37; padding-bottom: 10px; }
        
        /* Estilo de fotos en la galería */
        .grid-fotos { display: grid; grid-template-columns: repeat(auto-fill, minmax(80px, 1fr)); gap: 10px; margin-top: 15px; }
        .foto-item { width: 100%; height: 80px; object-fit: cover; border-radius: 5px; cursor: pointer; border: 1px solid #666; transition: 0.3s; }
        .foto-item:hover { border-color: #d4af37; transform: scale(1.1); }

        /* Lightbox (Foto Grande) */
        #lightbox { display: none; position: fixed; z-index: 1000; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); justify-content: center; align-items: center; }
        #img-grande { max-width: 90%; max-height: 80%; border: 2px solid #d4af37; border-radius: 10px; }

        .collage-img { width: 100%; border-radius: 10px; border: 2px solid #d4af37; margin-top: 20px; }
        .btn-whatsapp { background-color: #25d366; color: white; padding: 18px 40px; border-radius: 50px; text-decoration: none; font-weight: bold; margin: 40px 0; display: inline-block; position: sticky; bottom: 20px; z-index: 100; }
    </style>
</head>
<body>

    <div class="header-section">
        <img src="logo.png" alt="Logo" class="logo">
        <h1>FORJANDO TU IDENTIDAD VISUAL</h1>
        <p class="gold-text">Calidad, honor y precisión en cada impresión.</p>
    </div>

    <h2 style="letter-spacing: 5px; color: #d4af37;">NUESTRO ARSENAL</h2>
    
    <div class="services-grid">
        <!-- Sublimación con Galería -->
        <div class="card">
            <h3>Sublimación</h3>
            <div class="grid-fotos">
                <img src="galeria/sublimacion1.jpg" class="foto-item" onclick="abrirImagen(this.src)">
                <img src="galeria/sublimacion2.jpg" class="foto-item" onclick="abrirImagen(this.src)">
                <!-- Agrega más fotos aquí -->
            </div>
        </div>

        <!-- Impresión Digital con Galería -->
        <div class="card">
            <h3>Impresión Digital</h3>
            <div class="grid-fotos">
                <img src="galeria/impresion1.jpg" class="foto-item" onclick="abrirImagen(this.src)">
                <img src="galeria/impresion2.jpg" class="foto-item" onclick="abrirImagen(this.src)">
            </div>
        </div>

        <!-- Arte Digital -->
        <div class="card">
            <h3>Arte Digital</h3>
            <div class="grid-fotos">
                <img src="galeria/diseno1.jpg" class="foto-item" onclick="abrirImagen(this.src)">
            </div>
        </div>

        <!-- Rotulación -->
        <div class="card" style="grid-column: 1 / -1;">
            <h3>Rama de Rotulación Profesional</h3>
            <img src="collage.jpg" alt="Rotulación" class="collage-img">
        </div>
    </div>

    <!-- MAPA INTERACTIVO -->
    <h2 style="letter-spacing: 5px; color: #d4af37;">NUESTRO CUARTEL</h2>
    <div style="width: 100%; max-width: 900px; border: 2px solid #d4af37; border-radius: 12px; overflow: hidden; margin-bottom: 50px;">
        <iframe src="https://google.com" width="100%" height="400" style="border:0;" allowfullscreen="" loading="lazy"></iframe>
    </div>

    <!-- BOTÓN WHATSAPP -->
    <a href="https://wa.me/527209176036" class="btn-whatsapp">SOLICITAR COTIZACIÓN</a>

    <!-- LIGHTBOX -->
    <div id="lightbox" onclick="this.style.display='none'">
        <img id="img-grande" src="">
    </div>

    <script>
        function abrirImagen(src) {
            document.getElementById('img-grande').src = src;
            document.getElementById('lightbox').style.display = 'flex';
        }
    </script>
</body>
</html>

    </a>

</body>
</html>
