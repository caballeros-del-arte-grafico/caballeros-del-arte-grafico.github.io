<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Caballeros del Arte Gráfico</title>
    <style>
        body {
            background: radial-gradient(circle, #1e1e1e 0%, #000000 100%);
            color: #ffffff;
            font-family: 'Georgia', serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
        }
        img {
            max-width: 320px;
            margin-bottom: 30px;
            filter: drop-shadow(0 0 15px rgba(255,255,255,0.1));
            transition: transform 0.3s ease;
        }
        h1 {
            font-size: 2.5rem;
            letter-spacing: 5px;
            margin: 10px 0;
            text-transform: uppercase;
        }
        p {
            font-size: 1.2rem;
            color: #d4af37;
            font-style: italic;
        }
        /* Estilo del Botón de WhatsApp */
        .btn-whatsapp {
            margin-top: 30px;
            display: inline-block;
            background-color: #25d366;
            color: white;
            padding: 15px 30px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: bold;
            font-family: sans-serif;
            transition: background 0.3s ease;
        }
        .btn-whatsapp:hover {
            background-color: #128c7e;
        }
    </style>
</head>
<body>
    <img src="logo.png" alt="Logotipo Caballeros del Arte Gráfico">
    <h1>FORJANDO TU IDENTIDAD VISUAL</h1>
    <p>Calidad, honor y precisión en cada impresión.</p>

    <!-- AQUÍ PONES TU NÚMERO (Sin espacios ni símbolos) -->
    <a href="https://wa.me/527209176036" class="btn-whatsapp">
        SOLICITAR COTIZACIÓN POR WHATSAPP
    </a>

</body>
</html>
